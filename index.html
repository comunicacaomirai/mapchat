<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MAPCHAT PRO - ADM PLUS</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root { --primary: #e74c3c; --admin: #2c3e50; --gold: #f1c40f; --shadow: 0 4px 15px rgba(0,0,0,0.15); }
        body { margin: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow: hidden; background: #f4f4f4; }
        #map { height: calc(100vh - 70px); width: 100%; margin-top: 35px; z-index: 1; }
        .safety-banner { position: fixed; top: 0; width: 100%; background: rgba(44, 62, 80, 0.9); color: white; text-align: center; padding: 8px; font-size: 11px; z-index: 4000; backdrop-filter: blur(5px); font-weight: bold; }
        
        /* Popup de Notificação Real-time */
        #push-notification { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: var(--admin); color: white; padding: 15px; border-radius: 15px; z-index: 10000; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); }
        #push-notification.show { top: 50px; }

        .leaflet-popup-content-wrapper { border-radius: 15px; padding: 5px; box-shadow: var(--shadow); }
        #mural-view { position: fixed; top: 0; left: 0; width: 100%; height: calc(100vh - 70px); background: #f8f9fa; z-index: 1500; display: none; overflow-y: auto; padding: 60px 20px 20px 20px; box-sizing: border-box; }
        .card-mural { background: #fff; padding: 18px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .card-comercial { border-left: 5px solid var(--gold); background: #fffdf0; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: white; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 -2px 15px rgba(0,0,0,0.08); z-index: 2000; }
        .nav-btn { border:none; background:none; font-weight:600; color: #7f8c8d; cursor:pointer; display: flex; flex-direction: column; align-items: center; font-size: 10px; }
        .nav-btn.active { color: var(--primary); }
        
        #entry-form { position: fixed; inset: 0; background: white; z-index: 9999; padding: 25px; display: flex; flex-direction: column; gap: 12px; display: none; overflow-y: auto;}
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
        .btn-entrar { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        /* Estilo do Painel ADM */
        .admin-panel { margin-top: 15px; padding: 15px; background: #f0f2f5; border-radius: 12px; border: 1px dashed var(--admin); }
        .status-badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; font-weight: bold; }
        .status-on { background: #2ecc71; color: white; }
        .status-off { background: #95a5a6; color: white; }
    </style>
</head>
<body>

    <div id="push-notification">
        <div id="push-text"></div>
        <button onclick="document.getElementById('push-notification').classList.remove('show')" style="background:none; border:none; color:white; font-size: 20px;">&times;</button>
    </div>

    <div class="safety-banner">🔒 MENSAGENS ATIVAS NAS ÚLTIMAS 24H</div>

    <div id="entry-form">
        <h2 style="text-align: center; color: var(--admin);">Nova Postagem</h2>
        <input type="text" id="user-name" placeholder="Seu Nome" oninput="checkAdmin(this.value)">
        <input type="tel" id="user-whatsapp" placeholder="WhatsApp (opcional)">
        <textarea id="user-msg" placeholder="O que está acontecendo aqui?" rows="3" maxlength="150" oninput="document.getElementById('char-count').innerText = this.value.length + ' / 150'"></textarea>
        <div style="font-size: 11px; color: #999; text-align: right;" id="char-count">0 / 150</div>
        
        <button class="btn-entrar" id="btn-postar">PUBLICAR AGORA</button>
        <button onclick="fecharFormulario()" style="background:none; border:none; color:#95a5a6; padding:10px;">Voltar ao Mapa</button>

        <div id="admin-menu" style="display:none;" class="admin-panel">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <small>🛠 <b>PAINEL MIRAI ADM</b></small>
                <div id="status-indicators">
                    <span id="label-mod" class="status-badge status-off">Moderação: Não Ativado</span>
                    <span id="label-com" class="status-badge status-off">Comercial: Não Ativado</span>
                </div>
            </div>
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px;">
                <button onclick="toggleModoGerenciar()" style="padding: 8px; font-size: 11px;">Alternar Moderar</button>
                <button onclick="setPostComercial()" style="padding: 8px; font-size: 11px; background: var(--gold); border:none; border-radius:5px;">Ativar Comercial</button>
            </div>
            
            <button onclick="enviarPushGlobal()" style="width:100%; margin-top:10px; padding:10px; background: var(--admin); color:white; border:none; border-radius:8px; font-size:11px; font-weight:bold;">🚀 ENVIAR AVISO POPUP PARA TODOS</button>
        </div>
    </div>

    <div id="mural-view"><div id="lista-recados"></div></div>
    <div id="map"></div>

    <nav class="bottom-nav">
        <button class="nav-btn active" id="btn-nav-mapa" onclick="switchTab('mapa')">📍<br>MAPA</button>
        <button class="nav-btn" id="btn-nav-mural" onclick="switchTab('mural')">📋<br>MURAL</button>
        <button class="nav-btn" onclick="abrirPostagem()" style="background: var(--primary); color: white; width: 60px; height: 60px; border-radius: 50%; margin-top: -30px; box-shadow: 0 4px 12px rgba(231, 76, 60, 0.4); font-size: 24px;">+</button>
    </nav>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, where, Timestamp, doc, deleteDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAIO2x_OKrctSsNltwSIFqWnZIS2qKrRTQ",
        authDomain: "mapchat-26100.firebaseapp.com",
        projectId: "mapchat-26100",
        storageBucket: "mapchat-26100.firebasestorage.app",
        messagingSenderId: "883564076959",
        appId: "1:883564076959:web:d167a09100df5a9b46a7aa"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const ADMIN_KEY = "MIRAI2026";
    const URL_PLANILHA = "https://script.google.com/macros/s/AKfycbzPS1Un54LZBfG7UZF6c1Gfdpfp7-Pq3Pm9MZr5pID1fQaLHAxXtKGOeZ77XNauYhfg/exec";
    
    let isModoComercial = false;
    let isModoGerenciar = false;

    const map = L.map('map', { zoomControl: false }).setView([-25.44, -49.12], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    const markersCluster = L.markerClusterGroup();
    map.addLayer(markersCluster);

    window.abrirPostagem = () => { 
        document.getElementById('entry-form').style.display = 'flex';
        document.getElementById('entry-form').className = "animate__animated animate__slideInUp";
    };
    window.fecharFormulario = () => { document.getElementById('entry-form').style.display = 'none'; };
    window.switchTab = (tab) => {
        document.getElementById('mural-view').style.display = tab === 'mural' ? 'block' : 'none';
        document.getElementById('btn-nav-mapa').classList.toggle('active', tab === 'mapa');
        document.getElementById('btn-nav-mural').classList.toggle('active', tab === 'mural');
        if(tab === 'mapa') fecharFormulario();
    };

    window.checkAdmin = (val) => {
        document.getElementById('admin-menu').style.display = val.includes(ADMIN_KEY) ? 'block' : 'none';
    };

    // ALTERAÇÃO TRUE/FALSE PARA ATIVADO/NÃO ATIVADO
    window.toggleModoGerenciar = () => { 
        isModoGerenciar = !isModoGerenciar; 
        const lb = document.getElementById('label-mod');
        lb.innerText = isModoGerenciar ? "Moderação: Ativado" : "Moderação: Não Ativado";
        lb.className = isModoGerenciar ? "status-badge status-on" : "status-badge status-off";
    };

    window.setPostComercial = () => { 
        isModoComercial = !isModoComercial; 
        const lb = document.getElementById('label-com');
        lb.innerText = isModoComercial ? "Comercial: Ativado" : "Comercial: Não Ativado";
        lb.className = isModoComercial ? "status-badge status-on" : "status-badge status-off";
    };

    // FUNÇÃO PARA ENVIAR POPUP PARA QUEM ESTIVER ONLINE
    window.enviarPushGlobal = async () => {
        const texto = document.getElementById('user-msg').value;
        if(!texto) return alert("Escreva o aviso no campo de mensagem primeiro!");
        
        try {
            await addDoc(collection(db, "notificacoes"), {
                mensagem: texto,
                timestamp: Timestamp.now()
            });
            alert("Popup enviado para todos os usuários online!");
        } catch (e) { alert("Erro ao enviar popup."); }
    };

    // ESCUTAR NOTIFICAÇÕES EM TEMPO REAL
    onSnapshot(query(collection(db, "notificacoes"), where("timestamp", ">", Timestamp.now())), (snap) => {
        snap.docChanges().forEach((change) => {
            if (change.type === "added") {
                const data = change.doc.data();
                const push = document.getElementById('push-notification');
                document.getElementById('push-text').innerText = "📢 " + data.mensagem;
                push.classList.add('show');
                setTimeout(() => push.classList.remove('show'), 8000); // Some após 8 seg
            }
        });
    });

    window.apagarPin = async (id) => { if(confirm("Apagar permanentemente?")) await deleteDoc(doc(db, "pins", id)); };

    window.darLike = async (id) => {
        let curtidos = JSON.parse(localStorage.getItem('mapchat_curtidos') || '[]');
        if(curtidos.includes(id)) return;
        try {
            await updateDoc(doc(db, "pins", id), { likes: increment(1) });
            curtidos.push(id);
            localStorage.setItem('mapchat_curtidos', JSON.stringify(curtidos));
        } catch (e) {}
    };

    document.getElementById('btn-postar').addEventListener('click', async () => {
        const btn = document.getElementById('btn-postar');
        const nomeRaw = document.getElementById('user-name').value;
        const zap = document.getElementById('user-whatsapp').value;
        const msg = document.getElementById('user-msg').value;

        if(!nomeRaw || !msg) return alert("Preencha os campos!");

        const hoje = new Date().toLocaleDateString();
        const limitInfo = JSON.parse(localStorage.getItem('mapchat_limit') || '{"data":"","qtd":0}');
        if(limitInfo.data === hoje && limitInfo.qtd >= 3 && !nomeRaw.includes(ADMIN_KEY)) return alert("Limite diário atingido!");

        btn.disabled = true;
        btn.innerText = "PUBLICANDO...";

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const dados = {
                nome: nomeRaw.replace(ADMIN_KEY, "").trim(),
                whatsapp: zap,
                recado: msg,
                tipo: isModoComercial ? 'comercial' : 'normal',
                likes: 0,
                lat: pos.coords.latitude,
                lng: pos.coords.longitude,
                timestamp: Timestamp.now()
            };

            try {
                await addDoc(collection(db, "pins"), dados);
                fetch(URL_PLANILHA, { method: 'POST', mode: 'no-cors', body: JSON.stringify(dados) });
                localStorage.setItem('mapchat_limit', JSON.stringify({ data: hoje, qtd: limitInfo.data === hoje ? limitInfo.qtd + 1 : 1 }));
                
                isModoComercial = false;
                document.getElementById('user-msg').value = "";
                fecharFormulario();
            } catch (err) { alert("Erro."); }
            btn.disabled = false;
            btn.innerText = "PUBLICAR AGORA";
        }, () => { alert("Ative o GPS."); btn.disabled = false; });
    });

    const corte24h = Timestamp.fromMillis(Date.now() - (24 * 60 * 60 * 1000));
    onSnapshot(query(collection(db, "pins"), where("timestamp", ">", corte24h)), (snap) => {
        markersCluster.clearLayers();
        document.getElementById('lista-recados').innerHTML = "";
        const curtidos = JSON.parse(localStorage.getItem('mapchat_curtidos') || '[]');
        
        snap.forEach(d => {
            const val = d.data();
            const id = d.id;
            const jaCurti = curtidos.includes(id);
            const isCom = val.tipo === 'comercial';
            const iconUrl = isCom ? 'https://cdn-icons-png.flaticon.com/512/1169/1169908.png' : 'https://cdn-icons-png.flaticon.com/512/3177/3177361.png';
            
            const marker = L.marker([val.lat, val.lng], { icon: L.icon({iconUrl, iconSize:[35,35]}) });
            marker.bindPopup(`<b>${val.nome}</b><p>${val.recado}</p><button class="like-btn" onclick="darLike('${id}')">${jaCurti ? '❤️' : '🤍'} ${val.likes || 0}</button>`);
            markersCluster.addLayer(marker);

            document.getElementById('lista-recados').innerHTML += `
                <div class="card-mural ${isCom ? 'card-comercial' : ''}">
                    <strong>${isCom ? '⭐ ' : ''}${val.nome}</strong>
                    <p>${val.recado}</p>
                    <div style="display:flex; justify-content: space-between; align-items: center;">
                        <button class="like-btn" onclick="darLike('${id}')">${jaCurti ? '❤️' : '🤍'} ${val.likes || 0}</button>
                        ${isModoGerenciar ? `<button onclick="apagarPin('${id}')" style="color:red; border:none; background:none;">Excluir</button>` : ''}
                    </div>
                </div>`;
        });
    });
</script>
</body>
</html>
