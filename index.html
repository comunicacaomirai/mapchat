<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MAPCHAT PRO - LANÇAMENTO</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root { --primary: #e74c3c; --admin: #2c3e50; --gold: #f1c40f; --shadow: 0 4px 15px rgba(0,0,0,0.15); }
        body { margin: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow: hidden; background: #f4f4f4; }
        
        #map { height: calc(100vh - 70px); width: 100%; margin-top: 35px; z-index: 1; }
        
        /* Banner de Segurança */
        .safety-banner { position: fixed; top: 0; width: 100%; background: rgba(44, 62, 80, 0.9); color: white; text-align: center; padding: 8px; font-size: 11px; z-index: 4000; backdrop-filter: blur(5px); font-weight: bold; }

        /* Customização dos Popups (Cards) */
        .leaflet-popup-content-wrapper { border-radius: 15px; padding: 5px; box-shadow: var(--shadow); }
        .custom-card-popup { min-width: 180px; }
        .custom-card-popup b { color: var(--admin); font-size: 14px; display: block; margin-bottom: 5px; }
        .custom-card-popup p { margin: 5px 0; font-size: 13px; color: #444; line-height: 1.4; word-wrap: break-word; }
        
        /* Estilização da Lista (Mural) com Animação */
        #mural-view { position: fixed; top: 0; left: 0; width: 100%; height: calc(100vh - 70px); background: #f8f9fa; z-index: 1500; display: none; overflow-y: auto; padding: 60px 20px 20px 20px; box-sizing: border-box; }
        .card-mural { 
            background: #fff; padding: 18px; border-radius: 12px; margin-bottom: 15px; 
            border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.06); 
            animation: fadeInScale 0.4s ease-out;
        }
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .card-comercial { border-left: 5px solid var(--gold); background: #fffdf0; }
        
        /* Botões e Interface */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: white; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 -2px 15px rgba(0,0,0,0.08); z-index: 2000; }
        .nav-btn { border:none; background:none; font-weight:600; color: #7f8c8d; cursor:pointer; display: flex; flex-direction: column; align-items: center; font-size: 10px; }
        .nav-btn.active { color: var(--primary); }

        #entry-form { position: fixed; inset: 0; background: white; z-index: 9999; padding: 25px; display: flex; flex-direction: column; gap: 12px; display: none; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; font-family: inherit; }
        
        .btn-entrar { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 10px; font-weight: bold; font-size: 16px; box-shadow: 0 4px 10px rgba(231, 76, 60, 0.3); margin-top: 10px; cursor: pointer; }

        /* Push Notification */
        #push-notification { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: var(--admin); color: white; padding: 15px; border-radius: 15px; z-index: 9999; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); }
        #push-notification.show { top: 50px; }

        .like-btn { border:1px solid #eee; background: #fff; cursor:pointer; font-size:12px; border-radius: 20px; padding: 5px 12px; transition: 0.2s; }
        .char-counter { font-size: 11px; color: #999; text-align: right; margin-top: -8px; }
    </style>
</head>
<body>

    <div id="push-notification">
        <div id="push-text"></div>
        <button onclick="this.parentElement.classList.remove('show')" style="background:none; border:none; color:white; font-size: 18px;">&times;</button>
    </div>

    <div class="safety-banner">🔒 MENSAGENS ATIVAS NAS ÚLTIMAS 24H</div>

    <div id="entry-form">
        <h2 style="text-align: center; color: var(--admin);">Nova Postagem</h2>
        <input type="text" id="user-name" placeholder="Seu Nome" oninput="checkAdmin(this.value)">
        <input type="tel" id="user-whatsapp" placeholder="WhatsApp (opcional)">
        
        <textarea id="user-msg" placeholder="O que está a acontecer aqui?" rows="4" maxlength="150" oninput="atualizarContador(this.value)"></textarea>
        <div class="char-counter" id="char-count">0 / 150</div>
        
        <button class="btn-entrar" id="btn-postar">PUBLICAR AGORA</button>
        <button onclick="fecharFormulario()" style="background:none; border:none; color:#95a5a6; padding:10px;">Voltar ao Mapa</button>

        <div id="admin-menu" style="display:none; margin-top: 20px; padding: 15px; background: #eee; border-radius: 10px;">
            <small>🛠 ADMIN TOOLS</small>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 5px;">
                <button onclick="toggleModoGerenciar()" style="font-size: 10px; padding: 8px;">MODERAR</button>
                <button onclick="setPostComercial()" style="font-size: 10px; padding: 8px; background: var(--gold);">COMERCIAL</button>
            </div>
        </div>
    </div>

    <div id="mural-view">
        <div id="lista-recados"></div>
    </div>

    <div id="map"></div>

    <nav class="bottom-nav">
        <button class="nav-btn active" id="btn-nav-mapa" onclick="switchTab('mapa')">📍<br>MAPA</button>
        <button class="nav-btn" id="btn-nav-mural" onclick="switchTab('mural')">📋<br>MURAL</button>
        <button class="nav-btn" onclick="abrirPostagem()" style="background: var(--primary); color: white; width: 60px; height: 60px; border-radius: 50%; margin-top: -30px; box-shadow: 0 4px 12px rgba(231, 76, 60, 0.4); font-size: 24px;">+</button>
    </nav>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, where, Timestamp, doc, setDoc, deleteDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAIO2x_OKrctSsNltwSIFqWnZIS2qKrRTQ",
        authDomain: "mapchat-26100.firebaseapp.com",
        projectId: "mapchat-26100",
        storageBucket: "mapchat-26100.firebasestorage.app",
        messagingSenderId: "883564076959",
        appId: "1:883564076959:web:d167a09100df5a9b46a7aa"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const ADMIN_KEY = "MIRAI2026";
    
    let isModoComercial = false;
    let isModoGerenciar = false;

    // --- SETUP MAPA E CLUSTER ---
    const map = L.map('map', { zoomControl: false }).setView([-25.44, -49.12], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    const markersCluster = L.markerClusterGroup();
    map.addLayer(markersCluster);

    // --- FUNÇÕES DE INTERFACE ---
    window.atualizarContador = (val) => {
        document.getElementById('char-count').innerText = val.length + " / 150";
    };

    window.abrirPostagem = () => { 
        const el = document.getElementById('entry-form');
        el.style.display = 'flex';
        el.className = "animate__animated animate__slideInUp";
    };
    
    window.fecharFormulario = () => { document.getElementById('entry-form').style.display = 'none'; };

    window.switchTab = (tab) => {
        document.getElementById('mural-view').style.display = tab === 'mural' ? 'block' : 'none';
        document.getElementById('btn-nav-mapa').classList.toggle('active', tab === 'mapa');
        document.getElementById('btn-nav-mural').classList.toggle('active', tab === 'mural');
        if(tab === 'mapa') fecharFormulario();
    };

    // --- CARREGAMENTO INICIAL ---
    window.addEventListener('load', () => {
        const salvoNome = localStorage.getItem('mapchat_nome');
        const salvoZap = localStorage.getItem('mapchat_zap');
        if (salvoNome) {
            document.getElementById('user-name').value = salvoNome;
            checkAdmin(salvoNome);
        }
        if (salvoZap) document.getElementById('user-whatsapp').value = salvoZap;
    });

    window.checkAdmin = (val) => {
        document.getElementById('admin-menu').style.display = val.includes(ADMIN_KEY) ? 'block' : 'none';
    };

    window.toggleModoGerenciar = () => { isModoGerenciar = !isModoGerenciar; alert("Modo Moderação: " + isModoGerenciar); };
    window.setPostComercial = () => { isModoComercial = true; alert("Próximo post será Comercial"); };
    window.apagarPin = async (id) => { if(confirm("Apagar permanentemente?")) await deleteDoc(doc(db, "pins", id)); };

    window.darLike = async (id, isFake) => {
        let curtidos = JSON.parse(localStorage.getItem('mapchat_curtidos') || '[]');
        if(curtidos.includes(id)) return alert("Já curtiu esta mensagem!");
        try {
            await updateDoc(doc(db, "pins", id), { likes: increment(1) });
            curtidos.push(id);
            localStorage.setItem('mapchat_curtidos', JSON.stringify(curtidos));
        } catch (e) { console.error(e); }
    };

    // --- LÓGICA DE PUBLICAÇÃO COM TRAVAS ---
    document.getElementById('btn-postar').addEventListener('click', async () => {
        const btn = document.getElementById('btn-postar');
        const nomeRaw = document.getElementById('user-name').value;
        const zap = document.getElementById('user-whatsapp').value;
        const msg = document.getElementById('user-msg').value;

        if(!nomeRaw || !msg) return alert("Por favor, preencha o seu nome e a mensagem!");

        // --- REGRA: 3 POSTS POR DIA ---
        const hoje = new Date().toLocaleDateString();
        const limitInfo = JSON.parse(localStorage.getItem('mapchat_limit') || '{"data":"","qtd":0}');
        
        if(limitInfo.data === hoje && limitInfo.qtd >= 3 && !nomeRaw.includes(ADMIN_KEY)) {
            return alert("Limite diário atingido! Podes fazer até 3 postagens por dia.");
        }

        btn.disabled = true;
        btn.innerText = "A LOCALIZAR...";

        navigator.geolocation.getCurrentPosition(async (pos) => {
            btn.innerText = "A GUARDAR...";
            try {
                await addDoc(collection(db, "pins"), {
                    nome: nomeRaw.replace(ADMIN_KEY, "").trim(),
                    whatsapp: zap,
                    recado: msg,
                    tipo: isModoComercial ? 'comercial' : 'normal',
                    isAdmin: nomeRaw.includes(ADMIN_KEY),
                    likes: 0,
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    timestamp: Timestamp.now()
                });
                
                // Salvar dados de sessão e atualizar limite
                localStorage.setItem('mapchat_nome', nomeRaw);
                localStorage.setItem('mapchat_zap', zap);
                localStorage.setItem('mapchat_limit', JSON.stringify({
                    data: hoje, 
                    qtd: limitInfo.data === hoje ? limitInfo.qtd + 1 : 1
                }));

                isModoComercial = false;
                document.getElementById('user-msg').value = "";
                document.getElementById('char-count').innerText = "0 / 150";
                fecharFormulario();
            } catch (err) { alert("Erro ao ligar ao servidor."); }
            btn.disabled = false;
            btn.innerText = "PUBLICAR AGORA";
        }, () => { 
            alert("Precisamos do GPS para colocar a tua mensagem no mapa."); 
            btn.disabled = false; 
            btn.innerText = "PUBLICAR AGORA";
        });
    });

    // --- LEITURA REAL-TIME COM FILTRO 24H ---
    const corte24h = Timestamp.fromMillis(Date.now() - (24 * 60 * 60 * 1000));
    const q = query(collection(db, "pins"), where("timestamp", ">", corte24h));

    onSnapshot(q, (snap) => {
        markersCluster.clearLayers();
        document.getElementById('lista-recados').innerHTML = "";
        const curtidos = JSON.parse(localStorage.getItem('mapchat_curtidos') || '[]');
        const meusIds = JSON.parse(localStorage.getItem('mapchat_meus_ids') || '[]');
        
        snap.forEach(d => {
            const val = d.data();
            const id = d.id;
            const jaCurti = curtidos.includes(id);
            const isCom = val.tipo === 'comercial';
            
            // Ícones diferenciados
            const iconUrl = isCom ? 'https://cdn-icons-png.flaticon.com/512/1169/1169908.png' : 'https://cdn-icons-png.flaticon.com/512/3177/3177361.png';
            const marker = L.marker([val.lat, val.lng], { icon: L.icon({iconUrl, iconSize:[35,35]}) });

            // Popup Estilizado (Card)
            const popupContent = `
                <div class="custom-card-popup">
                    <b>${val.nome}</b>
                    <p>${val.recado}</p>
                    <div style="display:flex; gap:10px; align-items:center;">
                        <button class="like-btn" onclick="darLike('${id}', false)">
                            ${jaCurti ? '❤️' : '🤍'} ${val.likes || 0}
                        </button>
                        ${val.whatsapp ? `<a href="https://wa.me/55${val.whatsapp}" target="_blank" style="font-size:10px; color:green; text-decoration:none;">WhatsApp</a>` : ''}
                    </div>
                </div>`;
            
            marker.bindPopup(popupContent);
            markersCluster.addLayer(marker);

            // Mural Estilizado
            document.getElementById('lista-recados').innerHTML += `
                <div class="card-mural ${isCom ? 'card-comercial' : ''}">
                    <div style="display:flex; justify-content:space-between;">
                        <strong>${isCom ? '⭐ COMERCIAL: ' : ''}${val.nome}</strong>
                        <small style="color:#999">Ativo agora</small>
                    </div>
                    <p>${val.recado}</p>
                    <div style="display:flex; justify-content: space-between; align-items: center; margin-top:10px;">
                        <button class="like-btn" onclick="darLike('${id}', false)" style="color: ${jaCurti ? '#e74c3c' : '#666'}">
                            ${jaCurti ? '❤️' : '🤍'} ${val.likes || 0} Curtidas
                        </button>
                        ${isModoGerenciar ? `<button onclick="apagarPin('${id}')" style="color:red; border:none; background:none; cursor:pointer;">Eliminar</button>` : ''}
                    </div>
                </div>`;
        });
    });

    // Avisos e Alertas do Admin
    onSnapshot(doc(db, "config", "alerta"), (s) => { 
        if(s.exists()){ 
            document.getElementById('push-text').innerText = s.data().texto; 
            document.getElementById('push-notification').classList.add('show'); 
            setTimeout(() => document.getElementById('push-notification').classList.remove('show'), 8000); 
        }
    });
</script>
</body>
</html>
